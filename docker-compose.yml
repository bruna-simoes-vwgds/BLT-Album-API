services:
  mongodb:
    image: mongo:latest
    hostname: mongodb
    ports:
      - 27017:27017
    volumes:
      - ./init:/docker-entrypoint-initdb.d
      - db:/data/db
      - configdb:/data/configdb
      - mongot:/data/mongot
  api:
    env_file:
      - .env
    build: .
    ports:
      - "${GO_EXPOSE_PORT}:${GO_LISTENING_PORT}"

volumes:
  db:
  configdb:
  mongot: